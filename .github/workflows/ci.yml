name: CareerFlow CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # 1. Spin up a temporary PostgreSQL database for our tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: careerflow_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Dhana0313 
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # 2. Build the app
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven 

    - name: Build and Test with Maven
      run: mvn clean verify