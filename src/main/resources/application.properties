spring.application.name=Job-Portal

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/careerflow_db
spring.datasource.username=postgres
spring.datasource.password=your_password

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Secret (Use a long random string for security)
app.jwtSecret=MySuperSecretKeyForCareerFlowProjectWhichShouldBeLongEnough
app.jwtExpirationMs=86400000 
# (24 hours in milliseconds)


